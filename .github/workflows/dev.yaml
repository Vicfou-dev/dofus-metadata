name: Extract Dofus proto

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Custom suffix for the release tag (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  check-version:
    name: Check Game Version
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
      release_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm i -g cytrus-v6@0.1.1

      - name: Get current version
        id: version
        run: echo "version=$(cytrus-v6 version --game dofus --release dofus3)" >> $GITHUB_OUTPUT

      - name: Get latest release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_version=$(gh release list --exclude-pre-releases -L 1 | cut -f 3 | sed 's/^v//')
          echo "version=${latest_version}" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ steps.version.outputs.version }}-${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Check if should release
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.version.outputs.version }}" != "${{ steps.latest.outputs.version }}" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  extract-proto:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm i -g cytrus-v6@0.1.1

      - name: Download IL2CPP files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "temp" | Out-Null

          cytrus-v6 download `
            --game dofus `
            --release dofus3 `
            --output temp `
            --select "**/GameAssembly.dll" `
            --select "**/global-metadata.dat"

      - name: Run Il2CppDumper
        shell: pwsh
        run: |
          $gameAssembly = Get-ChildItem -Recurse -Filter GameAssembly.dll | Select-Object -First 1
          $metadata = Get-ChildItem -Recurse -Filter global-metadata.dat | Select-Object -First 1

          .\Il2CppDumper\Il2CppDumper.exe $gameAssembly.FullName $metadata.FullName

      - name: Generate proto
        shell: pwsh
        run: |
          .\Il2CppDumper\protodec.exe `
            ".\Il2CppDumper\DummyDll" `
            "dofus.proto" `
            --include-properties-without-non-user-code-attribute

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ needs.check-version.outputs.release_tag }}"

          gh release create $tag `
            --title "Release ${{ needs.check-version.outputs.release_tag }}" `
            --notes "Auto-generated Dofus proto file."

      - name: Upload proto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "v${{ needs.check-version.outputs.release_tag }}" "dofus.proto" --clobber
